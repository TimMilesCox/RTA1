export	PLATFORM=`uname`
if	[ $PLATFORM = Linux ]
then
	RAMFS=/dynamic/rta
else
	RAMFS=/Volumes/rta
fi

if	[ -e "$RAMFS/fponline" ]
then
	echo	$RAMFS filestore found
else
	sudo	./ramdev
fi

if      [ ! -e $RAMFS/fponline/$USER ]
then
        mkdir   $RAMFS/fponline/$USER
        chmod   0777 $RAMFS/fponline/$USER
	echo	"	\$path	"$RTA_BINARY/../../target.rta/ > $RAMFS/fponline/$USER/target.def
	echo	"	\$path	"$HOME/dynamic.rta/ > $RAMFS/fponline/$USER/target2.def
#	cp	$RTA_BINARY/../../target.rta/fponline/fixed.def $RAMFS/fponline/$USER
#	cp      $RTA_BINARY/../../target.rta/fponline/fponline.def $RAMFS/fponline/$USER
#	cp	$RTA_BINARY/../../target.rta/fponline/syntax.def $RAMFS/fponline/$USER
#	cp	$RTA_BINARY/../../target.rta/lib/144.def $RAMFS/fponline/$USER
#	cp	$RTA_BINARY/../../target.rta/fponline/pdu.msm $RAMFS/fponline/$USER
fi

if	[ -e $HOME/dynamic.rta ]
then
	echo	data found
else
	mkdir	$HOME/dynamic.rta
#	echo	"	\$path	"$RTA_BINARY/../../target.rta/ > $HOME/dynamic.rta/target.def
#	echo	"	\$path	"$HOME/dynamic.rta/ > $HOME/dynamic.rta/target2.def
	cp	$RTA_BINARY/../../target.rta/fponline/dynamic.def $HOME/dynamic.rta
fi

if	[ ! -e $HOME/dynamic.rta/my_names.def ]
then
	touch	$HOME/dynamic.rta/my_names.def
fi

