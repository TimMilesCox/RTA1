export	PLATFORM=`uname`
if	[ $PLATFORM = Linux ]
then
	RAMFS=/dynamic/rta
else
	RAMFS=/Volumes/rta
fi

if	[ -e "$RAMFS/fponline" ]
then
	echo	$RAMFS filestore found
else
	sudo	./ramdev
fi


if	[ -e $HOME/dynamic.rta ]
then
	echo	data found
else
	mkdir	$HOME/dynamic.rta
	echo	"	\$path	"$RTA_BINARY/../../target.rta/ > $HOME/dynamic.rta/target.def
	echo	"	\$path	"$HOME/dynamic.rta/ > $HOME/dynamic.rta/target2.def
	cp	$RTA_BINARY/../../target.rta/fponline/dynamic.def $HOME/dynamic.rta
fi

